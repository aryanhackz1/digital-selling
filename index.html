<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ZapUPI Wallet</title>
  <!-- ZapUPI Single HTML Web Kit -->
  <script src="https://zapupi.com/single-html-web-kit.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f5f7fb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      /* prevent text selection as extra layer */
      user-select: none;
      -webkit-user-select: none;
    }
    .wallet-card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 36px;
      padding: 28px 24px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 20, 50, 0.06);
      transition: all 0.2s ease;
    }
    .wallet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .wallet-header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #0b1b32;
    }
    .wallet-badge {
      background: #eef3fe;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      color: #1e4f8a;
    }
    .balance-section {
      background: linear-gradient(145deg, #1e2f4b, #142237);
      border-radius: 28px;
      padding: 24px 20px 20px;
      margin-bottom: 28px;
      color: white;
      box-shadow: 0 8px 18px rgba(0, 20, 50, 0.12);
    }
    .balance-label {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.75;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }
    .balance-amount {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .balance-amount small {
      font-size: 22px;
      font-weight: 500;
      opacity: 0.7;
    }
    .deposit-area {
      background: #f8faff;
      border-radius: 24px;
      padding: 20px 16px 24px;
      margin-bottom: 20px;
      border: 1px solid #e9edf4;
    }
    .deposit-area label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #1e2f4b;
      margin-bottom: 8px;
    }
    .input-group {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #d9e0eb;
      border-radius: 60px;
      padding: 4px 4px 4px 20px;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .input-group:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .input-group span {
      font-weight: 500;
      color: #1e2f4b;
      font-size: 16px;
      margin-right: 6px;
    }
    .input-group input {
      flex: 1;
      border: none;
      padding: 14px 8px 14px 0;
      font-size: 17px;
      font-weight: 500;
      background: transparent;
      outline: none;
      color: #0b1b32;
      min-width: 0;
    }
    .input-group input::placeholder {
      color: #a8b6cc;
      font-weight: 400;
      font-size: 15px;
    }
    .input-group button {
      background: #2563eb;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 16px;
      padding: 12px 22px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.2);
    }
    .input-group button:active {
      transform: scale(0.96);
      background: #1d4ed8;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    }
    .input-group button:disabled {
      opacity: 0.6;
      transform: none;
      pointer-events: none;
    }
    .transaction-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 10px;
      margin-bottom: 12px;
    }
    .transaction-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: #1e2f4b;
    }
    .transaction-header span {
      font-size: 13px;
      color: #6f7d98;
    }
    .history-list {
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .history-list li {
      background: #f9fcff;
      padding: 12px 16px;
      border-radius: 18px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #eef2f9;
      transition: 0.1s;
    }
    .history-list .tx-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-list .tx-type {
      font-weight: 500;
      font-size: 15px;
      color: #0b1b32;
    }
    .history-list .tx-date {
      font-size: 12px;
      color: #788aa8;
    }
    .history-list .tx-amount {
      font-weight: 600;
      font-size: 16px;
      color: #0b2d4b;
    }
    .history-list .tx-amount.credit {
      color: #0b7e4b;
    }
    .empty-history {
      text-align: center;
      color: #8899b4;
      font-size: 14px;
      padding: 28px 0 18px;
    }
    .footnote {
      margin-top: 16px;
      font-size: 13px;
      color: #7a8aa5;
      text-align: center;
      border-top: 1px solid #edf2f9;
      padding-top: 18px;
    }
    .toast-message {
      background: #142237;
      color: white;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      margin-top: 12px;
      text-align: center;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
    .toast-message.show {
      opacity: 1;
    }
    .history-list::-webkit-scrollbar {
      width: 4px;
    }
    .history-list::-webkit-scrollbar-track {
      background: #eef2f9;
      border-radius: 20px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: #bcc9df;
      border-radius: 20px;
    }
    /* disable selection and drag */
    img, a, button, input, div {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* but input should be selectable for typing */
    input {
      user-select: text !important;
      -webkit-user-select: text !important;
    }
  </style>
</head>
<body>
  <div class="wallet-card" id="walletApp">
    <div class="wallet-header">
      <h1>💳 Wallet</h1>
      <span class="wallet-badge">ZapUPI</span>
    </div>

    <!-- BALANCE DISPLAY -->
    <div class="balance-section">
      <div class="balance-label">Available Balance</div>
      <div class="balance-amount" id="walletBalanceDisplay">₹ <span id="balanceNumber">0.00</span></div>
    </div>

    <!-- DEPOSIT / PAYMENT SECTION -->
    <div class="deposit-area">
      <label for="depositInput">💰 Deposit via UPI</label>
      <div class="input-group">
        <span>₹</span>
        <input type="number" id="depositInput" placeholder="Enter amount" min="1" step="0.01" value="10">
        <button id="depositBtn">Deposit</button>
      </div>
      <div id="statusToast" class="toast-message">✅ Done</div>
    </div>

    <!-- TRANSACTION HISTORY -->
    <div class="transaction-header">
      <h3>📋 History</h3>
      <span id="txCount">0 entries</span>
    </div>
    <ul class="history-list" id="transactionList">
      <li class="empty-history">No transactions yet</li>
    </ul>
    <div class="footnote">🔒 Secured · ZapUPI sandbox</div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- DISABLE RIGHT CLICK & INSPECT (keyboard shortcuts) -----
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });

      // Disable common inspect keys: F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U (view source)
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.key === 'F12' || e.keyCode === 123) {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+U (View Source)
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'i' || e.key === 'j')) {
          e.preventDefault();
          return false;
        }
        // Ctrl+U (view source)
        if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+C (inspect element)
        if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
          e.preventDefault();
          return false;
        }
        return true;
      });

      // Also disable drag and drop of images/elements if any (extra)
      document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
      });

      // ----- CORE STATE -----
      let balance = 0.00;
      const transactions = [];
      const balanceSpan = document.getElementById('balanceNumber');
      const depositInput = document.getElementById('depositInput');
      const depositBtn = document.getElementById('depositBtn');
      const transactionList = document.getElementById('transactionList');
      const txCountSpan = document.getElementById('txCount');
      const statusToast = document.getElementById('statusToast');

      function refreshUI() {
        balanceSpan.textContent = balance.toFixed(2);
        if (transactions.length === 0) {
          transactionList.innerHTML = `<li class="empty-history">No transactions yet</li>`;
          txCountSpan.textContent = '0 entries';
          return;
        }
        const sorted = [...transactions].sort((a, b) => b.timestamp - a.timestamp);
        let html = '';
        sorted.forEach(tx => {
          const amountClass = tx.type === 'credit' ? 'tx-amount credit' : 'tx-amount';
          const sign = tx.type === 'credit' ? '+' : '';
          const dateStr = new Date(tx.timestamp).toLocaleString('en-IN', { 
            hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' 
          });
          html += `
            <li>
              <div class="tx-left">
                <span class="tx-type">${tx.type === 'credit' ? '📥 Deposit' : '💸 Debit'}</span>
                <span class="tx-date">${dateStr}</span>
              </div>
              <span class="${amountClass}">${sign}₹${tx.amount.toFixed(2)}</span>
            </li>
          `;
        });
        transactionList.innerHTML = html;
        txCountSpan.textContent = `${transactions.length} entries`;
      }

      function addTransaction(type, amount, orderId = null) {
        transactions.push({
          type: type,
          amount: amount,
          timestamp: Date.now(),
          orderId: orderId || 'N/A'
        });
        refreshUI();
      }

      function showToast(msg, isError = false) {
        statusToast.textContent = msg;
        statusToast.style.background = isError ? '#b91c1c' : '#142237';
        statusToast.classList.add('show');
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => {
          statusToast.classList.remove('show');
        }, 2800);
      }

      // ----- ZAPUPI CALLBACKS (MUST BE SET BEFORE createOrder) -----
      ZapUPI.setPaymentCallbacks({
        onSuccess: function(orderId) {
          const pendingAmount = parseFloat(window._pendingDepositAmount) || 0;
          if (pendingAmount > 0) {
            balance += pendingAmount;
            addTransaction('credit', pendingAmount, orderId || 'ZAP-' + Date.now());
            showToast(`✅ ₹${pendingAmount.toFixed(2)} added!`, false);
            window._pendingDepositAmount = null;
            depositBtn.disabled = false;
            depositBtn.textContent = 'Deposit';
          } else {
            showToast('✅ Payment success (amount unknown)', false);
          }
          refreshUI();
        },
        onFailed: function(orderId) {
          showToast(`❌ Payment failed. Order: ${orderId || 'N/A'}`, true);
          depositBtn.disabled = false;
          depositBtn.textContent = 'Deposit';
          window._pendingDepositAmount = null;
        },
        onTimeout: function(orderId) {
          showToast(`⏱️ Payment timeout. Order: ${orderId || 'N/A'}`, true);
          depositBtn.disabled = false;
          depositBtn.textContent = 'Deposit';
          window._pendingDepositAmount = null;
        }
      });

      // ----- DEPOSIT BUTTON CLICK -----
      depositBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const rawValue = depositInput.value.trim();
        const amount = parseFloat(rawValue);
        if (isNaN(amount) || amount <= 0) {
          showToast('⚠️ Please enter a valid amount', true);
          return;
        }
        const depositAmount = Math.round(amount * 100) / 100;
        if (depositAmount < 1) {
          showToast('⚠️ Minimum deposit ₹1', true);
          return;
        }

        depositBtn.disabled = true;
        depositBtn.textContent = 'Processing...';
        window._pendingDepositAmount = depositAmount;

        const orderId = 'ORD' + Date.now() + Math.floor(Math.random() * 1000);

        ZapUPI.createOrder(
          {
            zap_key: 'zap794ae3bd31fa4c991af3165b6ddc846e',
            order_id: orderId,
            amount: depositAmount.toFixed(2),
          },
          {
            onResponse: function(paymentUrl, orderId, data) {
              ZapUPI.loadPayment(paymentUrl);
            },
            onError: function(err) {
              showToast('⚠️ Order error: ' + err, true);
              depositBtn.disabled = false;
              depositBtn.textContent = 'Deposit';
              window._pendingDepositAmount = null;
            }
          }
        );
      });

      // Enter key trigger
      depositInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          depositBtn.click();
        }
      });

      // initial refresh
      refreshUI();
      console.log('✅ ZapUPI Wallet ready. Right-click & inspect disabled.');
    })();
  </script>
</body>
</html>
